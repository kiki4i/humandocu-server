name: Capsule Notify

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send capsule notify
        run: |
          curl -X POST https://humandocu-server-production.up.railway.app/api/today/capsule-notify \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
